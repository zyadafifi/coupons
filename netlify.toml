# Netlify Configuration for Coupons Web Admin
# This ensures the admin panel is always enabled on Netlify

[build]
  # Use the web build command that sets VITE_ENABLE_ADMIN=true
  command = "npm run build:web"
  publish = "dist"
  
[build.environment]
  # Explicitly set environment variable for Netlify
  VITE_ENABLE_ADMIN = "true"
  NODE_VERSION = "18"

# Redirect rules for HashRouter
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache optimization
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

